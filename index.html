<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Scanner de Produtos</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<div class="card">
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <input type="text" id="p-nome" placeholder="Nome do Produto">
    <p id="status"></p>
</div>

<script>
    document.getElementById('cameraInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const status = document.getElementById('status');
        const pNome = document.getElementById('p-nome');

        status.innerText = "Lendo texto da etiqueta...";
        
        // Tesseract lê a imagem e extrai o texto
        const { data: { text } } = await Tesseract.recognize(file, 'por');
        
        // Preenche o campo com o texto encontrado
        pNome.value = text.split('\n')[0]; // Pega a primeira linha detectada
        status.innerText = "Concluído!";
    });
</script>
</body>
</html>
