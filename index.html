<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shop Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; width: auto; font-size: 12px; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .nav { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav button { flex: 1; background: #334155; color: white; padding: 10px; border-radius: 8px; }
        .nav button.active { background: var(--accent); color: #0f172a; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #475569; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <button id="b1" class="active" onclick="show('add', 'b1')">Adicionar</button>
        <button id="b2" onclick="show('lista', 'b2')">Lista</button>
        <button id="b3" onclick="show('relat', 'b3')">Relatório</button>
    </div>

    <div id="add" class="tab-content active-tab card">
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <input type="text" id="p-nome" placeholder="Nome do Produto">
        <input type="number" id="p-valor" placeholder="R$ Valor">
        <button onclick="salvar()">Salvar Produto</button>
        <p id="status"></p>
    </div>

    <div id="lista" class="tab-content card">
        <table id="tabela">
            <thead><tr><th>Produto</th><th>Valor</th><th>Ação</th></tr></thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <div id="relat" class="tab-content card">
        <h3>Resumo</h3>
        <p id="resumo"></p>
        <button onclick="exportarExcel()">Exportar Excel</button>
    </div>
</div>

<script>
    function show(id, btnId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab'));
        document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active-tab');
        document.getElementById(btnId).classList.add('active');
        if(id === 'lista') renderLista();
        if(id === 'relat') renderRelatorio();
    }

    document.getElementById('cameraInput').addEventListener('change', async (e) => {
        document.getElementById('status').innerText = "Processando...";
        const { data: { text } } = await Tesseract.recognize(e.target.files[0], 'por');
        document.getElementById('p-nome').value = text.split('\n')[0].trim();
        document.getElementById('status').innerText = "Pronto!";
    });

    function salvar() {
        const nome = document.getElementById('p-nome').value;
        const valor = parseFloat(document.getElementById('p-valor').value);
        if(!nome || isNaN(valor)) return alert("Preencha campos!");
        
        const historico = JSON.parse(localStorage.getItem('compras') || '[]');
        historico.push({ nome, valor });
        localStorage.setItem('compras', JSON.stringify(historico));
        
        document.getElementById('p-nome').value = "";
        document.getElementById('p-valor').value = "";
        alert("Salvo!");
    }

    function excluir(index) {
        const historico = JSON.parse(localStorage.getItem('compras') || '[]');
        historico.splice(index, 1);
        localStorage.setItem('compras', JSON.stringify(historico));
        renderLista();
    }

    function renderLista() {
        const h = JSON.parse(localStorage.getItem('compras') || '[]');
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = h.map((p, index) => `
            <tr>
                <td>${p.nome}</td>
                <td>R$ ${p.valor.toFixed(2)}</td>
                <td><button class="btn-del" onclick="excluir(${index})">X</button></td>
            </tr>
        `).join('');
    }

    function renderRelatorio() {
        const h = JSON.parse(localStorage.getItem('compras') || '[]');
        const total = h.reduce((acc, cur) => acc + cur.valor, 0);
        document.getElementById('resumo').innerText = "Total acumulado: R$ " + total.toFixed(2);
    }

    function exportarExcel() {
        const h = JSON.parse(localStorage.getItem('compras') || '[]');
        const ws = XLSX.utils.json_to_sheet(h);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Dados");
        XLSX.writeFile(wb, "Compras.xlsx");
    }
</script>
</body>
</html>
